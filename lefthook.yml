# Lefthook configuration
# Docs: https://github.com/evilmartians/lefthook

# Pre-commit hooks - must match CI steps to catch failures locally
pre-commit:
  commands:
    # Format staged files
    format:
      glob: "*.{ts,tsx,js,jsx,json,md}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # Lint all source files (matches CI)
    lint:
      run: pnpm --filter @nestjs-ssr/react exec eslint src --ext .ts,.tsx --fix
      stage_fixed: true

    # Run tests with coverage (matches CI)
    test:
      run: pnpm --filter @nestjs-ssr/react test

    # Build package (matches CI)
    build:
      run: pnpm build:package

    # TypeScript check (matches CI)
    typecheck:
      run: pnpm --filter @nestjs-ssr/react exec tsc --noEmit

# Commit message validation
commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
