packages:
  - packages/*
  - examples/*

overrides:
  '@nestjs-ssr/react': link:packages/react

onlyBuiltDependencies:
  - esbuild
  - '@swc/core'
  - unrs-resolver

ignoredBuiltDependencies:
  - '@nestjs/core'
  - lefthook

allowBuilds:
  '@swc/core': true
  esbuild: true
  lefthook: true
  unrs-resolver: true
